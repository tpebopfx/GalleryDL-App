<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery-DL App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>✨ Загрузчик Медиа</h2>

        <div class="box">
            <label for="site-select">Источник</label>
            <select id="site-select">
                <option>Загрузка...</option>
            </select>

            <label for="tags-input">Теги, автор или ID</label>
            <input type="text" id="tags-input" placeholder="Ожидание...">
            <small id="tags-info" class="hint-text"></small>
        </div>

        <div class="accordion">
            <button class="accordion-btn" id="settings-btn">⚙️ Настройки</button>
            <div class="accordion-content" id="settings-content">
                <label>
                    <input type="checkbox" id="resume-checkbox" checked disabled>
                    Докачка (Игнорировать существующие)
                </label>
                <br>
                <label>
                    <input type="checkbox" id="sort-checkbox" checked>
                    Сортировать в папки
                </label>
            </div>
        </div>

        <div class="button-group">
            <button id="start-btn" class="primary">Скачать</button>
            <button id="stop-btn" class="stop">Остановить</button>
        </div>

        <div class="box">
            <label for="output-console">Результат</label>
            <textarea id="output-console" rows="8" readonly placeholder="Здесь будет отображаться лог загрузки..."></textarea>
        </div>

        <div class="box">
            <div class="history-header">
                <label>📜 История загрузок (Последние 50)</label>
                <button id="refresh-history-btn" class="icon-btn" title="Обновить историю">🔄</button>
            </div>
            <div id="history-container" class="history-list">
                <p class="hint-text">Загрузка истории...</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
